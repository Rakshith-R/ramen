# yamllint disable rule:line-length
---
resources:
  - https://raw.githubusercontent.com/rook/rook/release-1.19/deploy/examples/cluster-test.yaml
patches:
  - target:
      kind: CephCluster
      name: my-cluster
      namespace: rook-ceph
    patch: |-
      # Minikube does not persist /var/lib/rook, but it persists /data/*
      # https://minikube.sigs.k8s.io/docs/handbook/persistent_volumes/#a-note-on-mounts-persistence-and-minikube-hosts
      - op: replace
        path: /spec/dataDirHostPath
        value: /data/rook
      # Enable host networking - ceph monitors will be available on the host
      # network, exposed outside of the cluster.
      - op: add
        path: /spec/network
        value:
          provider: host
      # Enable log collection. Logs are created in /data/rook/rook-ceph/log and rotated.
      - op: add
        path: /spec/logCollector
        value:
          enabled: true
          periodicity: daily
          maxLogSize: 50M
      # Last ceph image that worked on arm64. Since v20.2.1 rbd-mirror is broken on arm64.
      - op: replace
        path: /spec/cephVersion/image
        value: quay.io/ceph/ceph:v20.2.0
      # Use PVC-backed OSDs to avoid full device scan.
      # Node-level storage triggers ceph-volume raw list on ALL devices
      # (hardcoded block="" in volume.go:212), which crashes on host
      # NVMe/virtual devices visible through shared kernel sysfs.
      # PVC-backed scopes the scan to one device (block="/mnt/<node>").
      - op: replace
        path: /spec/storage/useAllNodes
        value: false
      - op: replace
        path: /spec/storage/useAllDevices
        value: false
      - op: add
        path: /spec/storage/storageClassDeviceSets
        value:
          - name: ceph-osd
            count: 1
            portable: false
            tuneDeviceClass: false
            volumeClaimTemplates:
              - metadata:
                  name: data
                spec:
                  resources:
                    requests:
                      storage: 5Gi
                  storageClassName: ceph-block-local
                  volumeMode: Block
                  accessModes:
                    - ReadWriteOnce
