# SPDX-License-Identifier: Apache-2.0

# Lightweight CephFS + VolSync DR environment for standard GitHub Actions
# runners (4 CPUs, 16GB RAM). Uses docker driver, hub-on-spoke (dr1 = hub).
#
# Tests: CephFS failover/relocate, VRG VolSync, snapshots, S3 metadata,
# KubeObjectProtection.
#
# Inactive: RBD pool, rbd-mirror, csi-addons, submariner (docker bridge
# provides L2 connectivity between minikube containers).
---
name: "minikube-dr-cephfs"

ramen:
  hub: dr1
  clusters: [dr1, dr2]
  topology: regional-dr
  features:
    volsync: true
    auto_deploy: false

templates:
  - name: "hub-spoke"
    driver: "$container"
    container_runtime: containerd
    cpus: 2
    memory: "6g"
    disk_size: "10g"
    workers:
      - addons:
          - name: rook-operator
          - name: rook-cluster
          - name: external-snapshotter
          - name: rook-cephfs
          - name: rook-toolbox
      - addons:
          - name: ocm-hub
          - name: ocm-controller
      - addons:
          - name: csi-addons
          - name: ocm-cluster
            args: ["$name", "$name"]
      - addons:
          - name: minio
          - name: velero
          - name: recipe
  - name: "dr-cluster"
    driver: "$container"
    container_runtime: containerd
    cpus: 2
    memory: "6g"
    disk_size: "10g"
    workers:
      - addons:
          - name: rook-operator
          - name: rook-cluster
          - name: external-snapshotter
          - name: rook-cephfs
          - name: rook-toolbox
      - addons:
          - name: csi-addons
          - name: ocm-cluster
            args: ["$name", "dr1"]
      - addons:
          - name: minio
          - name: velero
          - name: recipe

profiles:
  - name: "dr1"
    template: "hub-spoke"
  - name: "dr2"
    template: "dr-cluster"

workers:
  - addons:
      - name: volsync
        args: ["dr1", "dr2"]
