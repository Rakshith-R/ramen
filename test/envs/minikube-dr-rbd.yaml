# Minimal single-cluster RBD environment for debugging Ceph OSD setup.
# Only rook-operator + rook-cluster + rook-pool.  Other addons disabled
# until OSD provisioning is confirmed working.
---
name: "minikube-dr-rbd"

templates:
  - name: "dr-cluster"
    driver: "$container"
    container_runtime: containerd
    cpus: 2
    memory: "6g"
    disk_size: "10g"
    workers:
      - addons:
          - name: rook-operator
          - name: rook-cluster
          - name: rook-pool

profiles:
  - name: "dr1"
    template: "dr-cluster"
