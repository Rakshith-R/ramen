# yamllint disable rule:line-length
---
name: e2e-minikube

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      profile:
        description: "DR profile to test"
        required: true
        default: "rbd"
        type: choice
        options:
          - rbd
          - cephfs

permissions:
  contents: read

env:
  MAX_WORKERS: 2
  BUILD_ID: ${{ github.run_id }}-${{ github.run_attempt }}
  DRENV_COMMAND_TIMEOUT: "1800"
  ROOK_CLUSTER_TIMEOUT: "1800"
  DRENV_LOG_LEVEL: DEBUG

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.profile)) || fromJSON('["rbd", "cephfs"]') }}

    steps:
    - name: Free disk space
      run: |
        set -euo pipefail
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
          /opt/ghc /usr/share/swift
        sudo docker image prune -af
        df -h /
        free -h

    - name: Checkout
      uses: actions/checkout@v6

    - name: Install CLI tools
      run: |
        set -euo pipefail
        # clusteradm (OCM)
        curl -fSL "https://github.com/open-cluster-management-io/clusteradm/releases/download/v0.11.2/clusteradm_linux_amd64.tar.gz" \
          | sudo tar xz -C /usr/local/bin clusteradm
        # velero
        curl -fSL "https://github.com/vmware-tanzu/velero/releases/download/v1.16.1/velero-v1.16.1-linux-amd64.tar.gz" \
          | sudo tar xz -C /usr/local/bin --strip-components=1 velero-v1.16.1-linux-amd64/velero
        # mc (MinIO client)
        curl -fSL -o /tmp/mc "https://dl.min.io/client/mc/release/linux-amd64/archive/mc.RELEASE.2025-08-13T08-35-41Z"
        sudo install /tmp/mc /usr/local/bin/mc
        mc --version
        # kubectl-gather
        curl -fSL -o /tmp/kubectl-gather "https://github.com/nirs/kubectl-gather/releases/download/v0.13.0/kubectl-gather-v0.13.0-linux-amd64"
        sudo install /tmp/kubectl-gather /usr/local/bin/kubectl-gather

    - name: Create virtual environment
      run: hack/make-venv .venv

    - name: Setup drenv
      working-directory: test
      run: |
        echo test/drenv.log >> "$GITHUB_WORKSPACE/artifacts.txt"
        source ../venv
        drenv setup envs/minikube-dr-${{ matrix.profile }}.yaml

    - name: Start minikube clusters
      working-directory: test
      run: |
        source ../venv
        drenv start --skip-addons --skip-tests envs/minikube-dr-${{ matrix.profile }}.yaml

    - name: Copy host udev data into minikube containers
      run: |
        set -euo pipefail
        # ceph-volume raw list crashes on devices without udev data.
        # sysfs is read-only inside containers so udevadm trigger won't work.
        # Copy the host's udev database into each container via tar pipe.
        for profile in dr1 dr2; do
          tar -C /run/udev -cf - data \
            | docker exec -i "$profile" sh -c 'mkdir -p /run/udev && tar -C /run/udev -xf -'
          echo "Copied udev data to $profile: $(docker exec "$profile" ls /run/udev/data/ | wc -l) entries"
        done

    - name: Prepare Ceph OSD disks
      run: |
        set -euo pipefail
        for profile in dr1 dr2; do
          echo "=== Setting up OSD disk on $profile ==="
          docker exec "$profile" bash -c "
            set -euo pipefail
            apt-get update -qq && apt-get install -y -qq lvm2 >/dev/null
            truncate -s 5G /data/ceph-osd.img
            LOOP=\$(losetup --find --show /data/ceph-osd.img)
            echo \"Loop device: \$LOOP\"
            pvcreate --yes \"\$LOOP\"
            vgcreate ceph-vg-${profile} \"\$LOOP\"
            lvcreate -l 100%FREE -n ceph-lv ceph-vg-${profile} --yes --zero n
            echo \"Created /dev/ceph-vg-${profile}/ceph-lv\"
            lsblk
          "
        done

    - name: Pre-load Ceph images into minikube
      run: |
        set -euo pipefail
        IMAGES=(
          quay.io/ceph/ceph:v20.2.0
          docker.io/rook/ceph:v1.19.7
          quay.io/cephcsi/cephcsi:v3.16.2
        )
        ts() { date +%H:%M:%S; }

        echo "[$(ts)] Pulling images to host docker..."
        pids=()
        for img in "${IMAGES[@]}"; do
          docker pull "$img" &
          pids+=($!)
        done
        for pid in "${pids[@]}"; do wait "$pid"; done
        echo "[$(ts)] Host pulls complete"

        # Load sequentially within each profile to avoid OOM.
        # Parallel across profiles is safe (separate containerd instances).
        load_profile() {
          local profile=$1
          for img in "${IMAGES[@]}"; do
            echo "[$(ts)] Loading $img → $profile"
            local start=$SECONDS
            minikube image load "$img" --profile "$profile"
            echo "[$(ts)] $img → $profile done ($((SECONDS - start))s)"
          done
        }
        load_profile dr1 &
        pid1=$!
        load_profile dr2 &
        pid2=$!
        wait "$pid1"
        wait "$pid2"
        echo "[$(ts)] All images loaded"

    - name: Verify images loaded
      run: |
        set -euo pipefail
        for profile in dr1 dr2; do
          echo "=== Images in $profile ==="
          minikube image ls --profile "$profile" 2>/dev/null | grep -E 'ceph|rook' || true
        done
        echo "=== Host resources ==="
        free -h; df -h /

    - name: Debug ceph-volume raw list (K8s pod context)
      run: |
        set -euo pipefail
        for profile in dr1 dr2; do
          echo "=== Testing ceph-volume in $profile (K8s pod) ==="
          kubectl --context "$profile" run ceph-debug --rm -i --restart=Never \
            --image=quay.io/ceph/ceph:v20.2.0 \
            --overrides='{
              "spec": {
                "containers": [{
                  "name": "ceph-debug",
                  "image": "quay.io/ceph/ceph:v20.2.0",
                  "command": ["bash", "-c", "echo DEVICES:; lsblk -d; echo UDEV:; ls /run/udev/data/ 2>&1 | head -5; echo RAW_LIST:; ceph-volume raw list --format json 2>&1; echo EXIT:$?"],
                  "securityContext": {"privileged": true},
                  "volumeMounts": [
                    {"name": "dev", "mountPath": "/dev"},
                    {"name": "udev", "mountPath": "/run/udev"},
                    {"name": "sys", "mountPath": "/sys"}
                  ]
                }],
                "volumes": [
                  {"name": "dev", "hostPath": {"path": "/dev"}},
                  {"name": "udev", "hostPath": {"path": "/run/udev"}},
                  {"name": "sys", "hostPath": {"path": "/sys"}}
                ]
              }
            }' 2>&1 || echo "Pod failed with: $?"
        done

    - name: Start addons
      timeout-minutes: 45
      working-directory: test
      run: |
        source ../venv
        drenv start --max-workers ${{ env.MAX_WORKERS }} envs/minikube-dr-${{ matrix.profile }}.yaml

    - name: Build ramen-operator container
      run: make docker-build

    - name: Deploy ramen
      run: |
        set -euo pipefail
        echo "=== Resources before deploy ==="
        free -h; df -h /
        source venv
        ramendev deploy test/envs/minikube-dr-${{ matrix.profile }}.yaml

    - name: Configure ramen
      uses: nick-fields/retry@v4
      with:
        timeout_seconds: 120
        max_attempts: 3
        command: |
          source venv
          ramendev config test/envs/minikube-dr-${{ matrix.profile }}.yaml

    - name: Prepare e2e config
      working-directory: e2e
      run: |
        ENV_NAME="minikube-dr-${{ matrix.profile }}"
        cat config.yaml.sample ~/.config/drenv/${ENV_NAME}/config.yaml > config.yaml

    - name: Run e2e validation
      working-directory: e2e
      run: |
        echo e2e/validation.log >> "$GITHUB_WORKSPACE/artifacts.txt"
        ./run.sh -test.run TestValidation -logfile validation.log

    - name: Run e2e dr tests
      working-directory: e2e
      run: |
        echo e2e/dr.log >> "$GITHUB_WORKSPACE/artifacts.txt"
        ./run.sh -test.run TestDR -logfile dr.log

    - name: Debug OSD prepare logs
      if: failure()
      run: |
        for profile in dr1 dr2; do
          echo "=== OSD prepare pods in $profile ==="
          kubectl --context "$profile" -n rook-ceph get pods -l app=rook-ceph-osd-prepare 2>/dev/null || true
          for pod in $(kubectl --context "$profile" -n rook-ceph get pods -l app=rook-ceph-osd-prepare -o name 2>/dev/null); do
            echo "--- Logs: $pod ---"
            kubectl --context "$profile" -n rook-ceph logs "$pod" --all-containers --previous 2>/dev/null || \
            kubectl --context "$profile" -n rook-ceph logs "$pod" --all-containers 2>/dev/null || true
          done
          echo "--- OSD prepare job status ---"
          kubectl --context "$profile" -n rook-ceph get jobs -l app=rook-ceph-osd-prepare -o yaml 2>/dev/null | grep -A5 'conditions\|status:' | head -20 || true
        done

    - name: Gather environment data
      if: always()
      working-directory: test
      timeout-minutes: 3
      run: |
        echo test/gather >> "$GITHUB_WORKSPACE/artifacts.txt"
        source ../venv
        drenv gather --directory gather envs/minikube-dr-${{ matrix.profile }}.yaml

    - name: Archive artifacts
      if: always()
      run: |
        # Filter out missing paths before archiving
        xargs -a artifacts.txt -I{} sh -c 'test -e "{}" && echo "{}"' > artifacts-exist.txt || true
        if [ -s artifacts-exist.txt ]; then
          tar --create \
              --gzip \
              --file e2e-minikube.${{ env.BUILD_ID }}.tar.gz \
              --transform "s|^|e2e-minikube.${{ env.BUILD_ID }}/|" \
              --files-from artifacts-exist.txt
        fi

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: e2e-minikube-${{ matrix.profile }}.${{ env.BUILD_ID }}
        path: e2e-minikube.${{ env.BUILD_ID }}.tar.gz
        compression-level: 0
        retention-days: 15

    - name: Delete clusters
      if: always()
      working-directory: test
      run: |
        source ../venv
        drenv delete envs/minikube-dr-${{ matrix.profile }}.yaml

    - name: Cleanup drenv
      if: always()
      working-directory: test
      run: |
        source ../venv
        drenv cleanup envs/minikube-dr-${{ matrix.profile }}.yaml
